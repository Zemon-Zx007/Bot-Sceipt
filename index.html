<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIFT HUB | Official Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: white;
            font-family: 'Kanit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .banner {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        h1 { color: #00ff7f; margin: 10px 0; font-size: 24px; }
        p { color: #888; font-size: 14px; }
        .status-dot {
            height: 12px;
            width: 12px;
            background-color: #00ff7f;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px #00ff7f;
        }
        .btn {
            display: block;
            background: #00ff7f;
            color: #000;
            text-decoration: none;
            padding: 12px;
            margin-top: 20px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); background: #00cc66; }
        footer { margin-top: 20px; font-size: 10px; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn.discordapp.com/attachments/1480814533214732308/1491139952409448498/IMG_2030.gif" class="banner" alt="Swift Hub">
        <h1>SWIFT HUB</h1>
        <p><span class="status-dot"></span> System is Running Online</p>
        <p>ยินดีต้อนรับสู่หน้าจัดการสคริปต์ของซีม่อน บอทพร้อมใช้งานใน Discord แล้วค่ะ!</p>
        <a href="https://discord.com" class="btn">เข้าสู่ Discord</a>
        <footer>Powered by Pai & Zemon</footer>
    </div>
</body>
</html>
