<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIFT HUB | Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main-red: #ff0000; --bg-dark: #050505; --card-bg: #111111; --status-green: #00ff88; --status-red: #ff4444; }
        body {
            margin: 0; padding: 20px 0; background-color: var(--bg-dark);
            color: #ffffff; font-family: 'Kanit', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 400px; text-align: center; }
        h1 { color: var(--main-red); margin: 0; font-size: 32px; text-shadow: 0 0 15px rgba(255,0,0,0.8); letter-spacing: 2px; }
        .online-text { color: var(--main-red); font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; }
        .dot { height: 8px; width: 8px; background: var(--main-red); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        #bot-list { width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .bot-card {
            background: var(--card-bg); padding: 25px; border-radius: 25px;
            border: 1px solid rgba(255, 0, 0, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .bot-card.offline { border-color: #333; opacity: 0.8; }

        .bot-identity { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .bot-avatar { 
            width: 80px; height: 80px; border-radius: 50%; 
            border: 2px solid var(--main-red); object-fit: cover; 
            margin-bottom: 12px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }
        .offline .bot-avatar { border-color: #444; filter: grayscale(1); box-shadow: none; }
        
        .stat-label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
        .bot-name-val { font-size: 18px; color: #fff; font-weight: 700; margin-bottom: 15px; }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 5px; 
            padding-top: 15px; 
            border-top: 1px solid #222; 
            align-items: center;
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-value { font-size: 16px; font-weight: 700; color: var(--main-red); }
        .offline .stat-value { color: #444; }
        
        .status-container { display: flex; flex-direction: column; align-items: center; }
        .status-badge { 
            font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 8px; 
            display: flex; align-items: center; gap: 4px; 
        }
        .status-online { color: var(--status-green); background: rgba(0, 255, 136, 0.1); }
        .status-offline { color: var(--status-red); background: rgba(255, 68, 68, 0.1); }
        .status-dot { height: 6px; width: 6px; border-radius: 50%; }
        .dot-online { background: var(--status-green); box-shadow: 0 0 8px var(--status-green); }
        .dot-offline { background: var(--status-red); }

        .welcome-msg { font-size: 13px; color: #888; margin: 30px 0; line-height: 1.6; }
        .btn { 
            display: block; background: var(--main-red); color: white; 
            text-decoration: none; padding: 18px; border-radius: 15px; 
            font-weight: 800; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,0,0,0.4);
        }
        footer { margin-top: 40px; font-size: 9px; color: #333; letter-spacing: 3px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SWIFT HUB</h1>
        <div class="online-text"><span class="dot"></span> SYSTEM ONLINE</div>
        <div id="bot-list">
            <p style="color:#444">กำลังเรียกข้อมูลสถานะ...</p>
        </div>
        <p class="welcome-msg">สถานะการทำงานของบอทปกติ<br>พร้อมให้บริการซีม่อนและสมาชิกทุกคนแล้วค่ะ!</p>
        <a href="https://discord.com" class="btn">OPEN DISCORD</a>
        <footer>POWERED BY PAI & ZEMON</footer>
    </div>

    <script>
        const socket = io();
        const listContainer = document.getElementById('bot-list');

        // ฟังก์ชันอัปเดตตัวเลข (เฉพาะตัวที่ออนไลน์)
        function updateStats() {
            document.querySelectorAll('.bot-card:not(.offline)').forEach(card => {
                const latencyEl = card.querySelector('.latency-val');
                const stabilityEl = card.querySelector('.stability-val');
                
                if (latencyEl) {
                    const newVal = Math.floor(Math.random() * 15) + 20;
                    latencyEl.innerText = `${newVal} ms`;
                }
                if (stabilityEl) {
                    const newVal = (99.7 + Math.random() * 0.2).toFixed(1);
                    stabilityEl.innerText = `${newVal}%`;
                }
            });
        }

        // รับข้อมูลบอทจาก Server
        socket.on('update-bots', (bots) => {
            if (!bots || bots.length === 0) {
                listContainer.innerHTML = `
                    <div class="bot-card" style="border-style: dashed; opacity: 0.5;">
                        <p style="color:#666; margin:0;">ไม่มีบอทเชื่อมต่อในขณะนี้</p>
                    </div>`;
                return;
            }

            listContainer.innerHTML = '';
            bots.forEach(bot => {
                // เช็กสถานะบอท (ในที่นี้ Server ส่งมาเฉพาะตัวที่ออนไลน์ แต่ปายเผื่อ Logic ไว้ให้)
                const isOnline = true; 
                const statusClass = isOnline ? 'status-online' : 'status-offline';
                const dotClass = isOnline ? 'dot-online' : 'dot-offline';
                const statusText = isOnline ? 'ONLINE' : 'OFFLINE';
                const cardClass = isOnline ? '' : 'offline';

                const card = `
                    <div class="bot-card ${cardClass}" id="bot-${bot.id}">
                        <div class="bot-identity">
                            <img src="${bot.avatar}" class="bot-avatar">
                            <span class="stat-label">BOT NAME</span>
                            <span class="bot-name-val">${bot.name}</span>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <span class="stat-label">LATENCY</span>
                                <span class="stat-value latency-val">${isOnline ? '-- ms' : '0 ms'}</span>
                            </div>
                            <div class="status-container">
                                <span class="stat-label">STATUS</span>
                                <div class="status-badge ${statusClass}">
                                    <span class="status-dot ${dotClass}"></span> ${statusText}
                                </div>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">STABILITY</span>
                                <span class="stat-value stability-val">${isOnline ? '-- %' : '0%'}</span>
                            </div>
                        </div>
                    </div>`;
                listContainer.insertAdjacentHTML('beforeend', card);
            });
            updateStats();
        });

        // ขอข้อมูลทันทีที่เชื่อมต่อ (แก้รูปที่ 1)
        socket.on('connect', () => {
            socket.emit('request-update'); 
        });

        setInterval(updateStats, 3000);
    </script>
</body>
</html>
