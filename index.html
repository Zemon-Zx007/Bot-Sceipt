<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIFT HUB | Real-time Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main-red: #ff0000; --bg-dark: #0a0a0a; --card-bg: #141414; }
        body {
            margin: 0; padding: 20px 0; background-color: var(--bg-dark);
            color: #ffffff; font-family: 'Kanit', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 400px; text-align: center; }
        h1 { color: var(--main-red); margin: 0; font-size: 32px; text-shadow: 0 0 15px rgba(255,0,0,0.6); }
        .online-text { color: var(--main-red); font-size: 14px; margin-bottom: 25px; }
        .dot { height: 8px; width: 8px; background: var(--main-red); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        #bot-list { width: 100%; display: flex; flex-direction: column; gap: 15px; min-height: 50px; }
        .bot-card {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            border: 1.5px solid var(--main-red); box-shadow: 0 0 20px rgba(255, 0, 0, 0.15);
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .bot-identity { display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .bot-avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--main-red); object-fit: cover; margin-bottom: 12px; box-shadow: 0 0 10px var(--main-red); }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .bot-name-val { font-size: 18px; color: #ffffff; font-weight: 500; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--main-red); }

        .welcome-msg { font-size: 13px; color: #bbb; margin: 25px 0; line-height: 1.6; }
        .btn { display: block; background: var(--main-red); color: white; text-decoration: none; padding: 16px; border-radius: 15px; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,0,0,0.3); }
        footer { margin-top: 30px; font-size: 10px; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SWIFT HUB</h1>
        <div class="online-text"><span class="dot"></span> SYSTEM ONLINE</div>
        
        <div id="bot-list">
            </div>

        <p class="welcome-msg">สถานะการทำงานของบอทปกติ<br>พร้อมให้บริการซีม่อนและสมาชิกทุกคนแล้วค่ะ!</p>
        <a href="https://discord.com" class="btn">OPEN DISCORD</a>
        <footer>POWERED BY PAI & ZEMON</footer>
    </div>

    <script>
        const socket = io();
        const listContainer = document.getElementById('bot-list');

        socket.on('update-bots', (bots) => {
            const currentElements = Array.from(listContainer.children);
            const currentIds = currentElements.map(el => el.dataset.id);
            const newIds = bots.map(b => b.id);

            // 1. ลบบอทที่ออกไปแล้ว (Real-time ลบออกทันที)
            currentElements.forEach(el => {
                if (!newIds.includes(el.dataset.id)) el.remove();
            });

            // 2. เพิ่มบอทใหม่ (ถ้ายังไม่มีในหน้าเว็บ)
            bots.forEach(bot => {
                if (!currentIds.includes(bot.id)) {
                    const ping = Math.floor(Math.random() * 21) + 20; // สุ่ม 20-40 ms
                    const stable = (99.7 + Math.random() * 0.2).toFixed(1); // สุ่ม 99.7-99.9%
                    
                    const card = `
                        <div class="bot-card" data-id="${bot.id}">
                            <div class="bot-identity">
                                <img src="${bot.avatar}" class="bot-avatar">
                                <span class="stat-label">BOT NAME</span>
                                <span class="bot-name-val">${bot.name}</span>
                            </div>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <span class="stat-label">LATENCY</span>
                                    <span class="stat-value">${ping} ms</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">STABILITY</span>
                                    <span class="stat-value">${stable}%</span>
                                </div>
                            </div>
                        </div>`;
                    listContainer.insertAdjacentHTML('beforeend', card);
                }
            });
        });
    </script>
</body>
</html>
