<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIFT HUB | Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Kanit', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 85%; max-width: 380px;
            background: #141414;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            text-align: center;
        }
        .status-box {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #333;
        }
        .bot-identity {
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* สไตล์รูปวงกลม */
        .bot-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            margin-bottom: 10px;
            object-fit: cover;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 11px; color: #888; display: block; text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: 700; color: #ff0000; }
        .bot-name-val { font-size: 16px; color: #ffffff; font-weight: 500; }
        
        h1 { color: #ff0000; margin: 0; font-size: 28px; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .online-text { color: #ff0000; font-size: 14px; margin-bottom: 20px; font-weight: 300; }
        .dot { height: 8px; width: 8px; background: #ff0000; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #ff0000; }
        
        .btn {
            display: block;
            background: #ff0000;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255,0,0,0.5); }
        footer { margin-top: 20px; font-size: 10px; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SWIFT HUB</h1>
        <div class="online-text"><span class="dot"></span> SYSTEM ONLINE</div>
        
        <div class="status-box">
            <div class="bot-identity">
                <img src="https://cdn.discordapp.com/attachments/1480814533214732308/1491139952409448498/IMG_2030.gif" class="bot-avatar" alt="Bot Logo">
                <span class="stat-label">BOT NAME</span>
                <span class="bot-name-val">Get Script | Swift Hub</span>
            </div>
            <div class="stats-grid" style="padding: 0 15px 15px 15px;">
                <div class="stat-item">
                    <span class="stat-label">LATENCY</span>
                    <span class="stat-value" id="ping">-- ms</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">STABILITY</span>
                    <span class="stat-value" id="stable">99.9%</span>
                </div>
            </div>
        </div>

        <p style="font-size: 13px; color: #bbb; line-height: 1.6;">
            สถานะการทำงานของบอทปกติ<br>พร้อมให้บริการซีม่อนและสมาชิกทุกคนแล้วค่ะ!
        </p>
        
        <a href="https://discord.com" class="btn">OPEN DISCORD</a>
        <footer>POWERED BY PAI & ZEMON</footer>
    </div>

    <script>
        function updateStats() {
            const ping = Math.floor(Math.random() * (45 - 25 + 1)) + 25;
            document.getElementById('ping').innerText = ping + ' ms';
            const stable = (Math.random() * (99.9 - 99.8) + 99.8).toFixed(1);
            document.getElementById('stable').innerText = stable + '%';
        }
        setInterval(updateStats, 2000);
        updateStats();
    </script>
</body>
</html>
